name: Auto Tag on Release Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  create-tag:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          TAG="${BRANCH#release/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release: $TAG (version: $VERSION)"

      - name: Verify config.yaml version
        run: |
          CONFIG_VERSION=$(grep '^version:' python_dev_env/config.yaml | sed 's/version: *"\(.*\)"/\1/')
          if [ "$CONFIG_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Version mismatch: config.yaml has $CONFIG_VERSION but branch says ${{ steps.version.outputs.version }}"
            exit 1
          fi

      - name: Check tag doesn't exist
        run: |
          if git tag -l "${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists"
            exit 1
          fi

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Trigger Docker build
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docker-build.yaml',
              ref: 'main',
              inputs: {
                tag: '${{ steps.version.outputs.tag }}'
              }
            });
            console.log('Triggered docker-build.yaml with tag: ${{ steps.version.outputs.tag }}');
