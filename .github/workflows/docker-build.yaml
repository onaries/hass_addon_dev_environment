name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/docker-build.yaml'
      - 'python_dev_env/**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v1.2.0)'
        required: false
        default: ''

env:
  DOCKER_HUB_USERNAME: ksw8954
  IMAGE_NAME: python-dev-env

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for smoke test
        run: |
          docker build \
            --build-arg BUILD_FROM=ghcr.io/home-assistant/amd64-base-debian:bookworm \
            -t local/python-dev-env:smoke \
            python_dev_env

      - name: Smoke test run.sh startup
        run: |
          set -euo pipefail

          CONTAINER_NAME="dev-env-smoke-run"
          VOLUME_NAME="dev-env-smoke-data"

          cleanup() {
            docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true
            docker volume rm -f "$VOLUME_NAME" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker volume create "$VOLUME_NAME" >/dev/null
          docker run --rm -v "$VOLUME_NAME:/data" local/python-dev-env:smoke sh -c 'mkdir -p /data/user_local/share/zinit && printf "{}\n" > /data/options.json'

          CID=$(docker run -d --name "$CONTAINER_NAME" -v "$VOLUME_NAME:/data" -v /var/run/docker.sock:/var/run/docker.sock local/python-dev-env:smoke /run.sh)
          echo "Smoke test container: $CID"

          RESULT="timeout"
          for _ in $(seq 1 30); do
            STATUS=$(docker inspect -f '{{.State.Status}} {{.State.ExitCode}}' "$CONTAINER_NAME")
            LOGS=$(docker logs "$CONTAINER_NAME" 2>&1 || true)

            if echo "$LOGS" | grep -q "FATAL:"; then
              RESULT="fatal"
              break
            fi

            if echo "$LOGS" | grep -q "Starting services via supervisord..."; then
              RESULT="started"
              break
            fi

            if echo "$STATUS" | grep -q '^exited'; then
              RESULT="exited"
              break
            fi

            sleep 10
          done

          echo "Smoke result: $RESULT"
          docker logs "$CONTAINER_NAME" 2>&1 | tail -n 300 || true

          if [ "$RESULT" != "started" ]; then
            echo "run.sh smoke test failed"
            exit 1
          fi

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version and release info
        if: github.event_name != 'pull_request'
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          # Get annotated tag message (if any)
          TAG_MSG=$(git tag -l --format='%(contents)' "$TAG" 2>/dev/null || true)

          # Get previous tag for changelog
          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || echo "")

          # Build release body
          BODY=""
          if [ -n "$TAG_MSG" ]; then
            BODY="$TAG_MSG"$'\n\n'
          fi
          if [ -n "$PREV_TAG" ]; then
            BODY="${BODY}## Changes since ${PREV_TAG}"$'\n\n'
            BODY="${BODY}$(git log --pretty=format:'- %s (%h)' ${PREV_TAG}..${TAG})"$'\n\n'
            BODY="${BODY}**Full diff**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
          fi

          # Write to file to preserve multiline
          echo "$BODY" > /tmp/release_body.md

      - name: Build and push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: python_dev_env
          push: true
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/amd64-base-debian:bookworm
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        if: >-
          github.event_name != 'pull_request' &&
          (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: /tmp/release_body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
